name: CMake on multiple platforms

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release]
        c_compiler: [gcc, clang, cl]
        include:
          - os: windows-latest
            c_compiler: cl
            cpp_compiler: cl
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
        exclude:
          - os: windows-latest
            c_compiler: gcc
          - os: windows-latest
            c_compiler: clang
          - os: ubuntu-latest
            c_compiler: cl

    steps:
    - uses: actions/checkout@v4

    - name: Set reusable strings
      id: strings
      shell: bash
      run: |
        echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Conan
      run: pip install conan

    - name: Detect Conan profile
      run: conan profile detect --force

    - name: Configure Conan profile (Linux GCC)
      if: matrix.c_compiler == 'gcc'
      shell: bash
      run: |
        GCC_VERSION=$(gcc -dumpversion | cut -d. -f1)
        cat > ~/.conan2/profiles/default << EOF
        [settings]
        os=Linux
        arch=x86_64
        build_type=${{ matrix.build_type }}
        compiler=gcc
        compiler.version=$GCC_VERSION
        compiler.libcxx=libstdc++11
        compiler.cppstd=17
        EOF
        cat ~/.conan2/profiles/default

    - name: Configure Conan profile (Linux Clang)
      if: matrix.c_compiler == 'clang'
      shell: bash
      run: |
        CLANG_VERSION=$(clang --version | grep -oP '\d+' | head -1)
        cat > ~/.conan2/profiles/default << EOF
        [settings]
        os=Linux
        arch=x86_64
        build_type=${{ matrix.build_type }}
        compiler=clang
        compiler.version=$CLANG_VERSION
        compiler.libcxx=libstdc++11
        compiler.cppstd=17
        EOF
        cat ~/.conan2/profiles/default

    - name: Configure Conan profile (Windows MSVC)
      if: matrix.c_compiler == 'cl'
      shell: pwsh
      run: |
        $profilePath = "$env:USERPROFILE\.conan2\profiles\default"
        @"
        [settings]
        os=Windows
        arch=x86_64
        build_type=${{ matrix.build_type }}
        compiler=msvc
        compiler.version=194
        compiler.runtime=dynamic
        compiler.cppstd=17
        "@ | Set-Content $profilePath
        Get-Content $profilePath

    - name: Install dependencies via Conan
      run: >
        conan install ${{ github.workspace }}
        --output-folder=${{ steps.strings.outputs.build-output-dir }}
        --build=missing
        --settings=build_type=${{ matrix.build_type }}

    - name: Configure CMake
      run: >
        cmake -B ${{ steps.strings.outputs.build-output-dir }}
        -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
        -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
        -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
        -DCMAKE_TOOLCHAIN_FILE=${{ steps.strings.outputs.build-output-dir }}/conan_toolchain.cmake
        -S ${{ github.workspace }}

    - name: Build
      run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

    - name: Test
      working-directory: ${{ steps.strings.outputs.build-output-dir }}
      run: ctest --build-config ${{ matrix.build_type }}
